<!DOCTYPE html>
<html lang="fr" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumière Audio - Lecteur DAISY</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f59e0b">
    <link class="apple-touch-icon" href="icons/icon-192.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#d97706',
                        'primary-container': '#fef3c7',
                        'on-primary-container': '#78350f',
                        'surface-container': '#f8fafc'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 transition-colors duration-200 min-h-screen flex flex-col font-luciole pb-40">

    <header class="p-6 bg-white shadow-sm flex justify-between items-center border-b-4">
        <h1 class="text-4xl font-black flex items-center gap-4 text-amber-700">
            <span class="material-symbols-outlined text-6xl">lightbulb</span> Lumière Audio
        </h1>
        <div class="flex items-center gap-4">
            <button id="btn-theme-toggle" class="p-5 rounded-3xl bg-slate-100 hover:bg-slate-200 flex items-center justify-center text-slate-800 border-4 border-slate-300 shadow-md focus:outline-none focus:ring-4 focus:ring-amber-500" aria-label="Changer le thème d'accessibilité visuelle">
                <span class="material-symbols-outlined text-5xl">palette</span>
            </button>
        </div>
    </header>

    <main class="flex-1 max-w-4xl w-full mx-auto p-4 md:p-6">
        
        <section id="view-home" class="space-y-8 py-4">
            <div class="bg-white p-8 md:p-10 rounded-3xl shadow-md border-4 text-center space-y-8">
                <p class="text-2xl md:text-3xl leading-relaxed text-slate-700 font-bold">
                    Votre lecteur de livres audio DAISY. <br>
                    Glissez-déposez l'archive ZIP ou parcourez vos fichiers.
                </p>
                
                <div id="dropZone" class="border-8 border-dashed border-slate-400 rounded-3xl p-12 md:p-24 cursor-pointer hover:border-amber-500 hover:bg-amber-50/50 transition-all text-center group bg-slate-50">
                    <span class="material-symbols-outlined text-[80px] md:text-[120px] text-slate-400 group-hover:text-amber-600 transition-colors">cloud_upload</span>
                    <p class="mt-6 text-3xl md:text-4xl font-black text-slate-700">Déposez votre fichier ZIP ici</p>
                    <button id="btn-browse" class="mt-10 bg-amber-600 text-white font-black text-2xl md:text-3xl px-12 py-6 rounded-3xl shadow-2xl border-4 border-amber-700 hover:bg-amber-700 active:scale-95 transition-transform focus:outline-none focus:ring-4 focus:ring-amber-500">Parcourir mes fichiers</button>
                    <input type="file" id="file-input" accept=".zip" class="hidden">
                </div>
            </div>
        </section>

        <section id="view-history" class="hidden space-y-6 py-6">
            <h2 class="text-3xl md:text-4xl font-black flex items-center gap-4"><span class="material-symbols-outlined text-5xl">history</span> Vos lectures récentes</h2>
            <div id="history-container" class="space-y-6">
                </div>
        </section>

        <section id="view-player" class="hidden space-y-8 py-4">
            
            <div class="bg-white p-6 md:p-8 rounded-3xl shadow-md border-4 border-slate-200 space-y-6">
                <div class="text-center">
                    <h3 id="book-title" class="text-3xl md:text-4xl font-black text-amber-700 truncate">Titre du livre</h3>
                    <p id="cleanChapterTitle" class="text-xl md:text-2xl font-bold text-slate-500 truncate mt-2">Chapitre</p>
                </div>
                <div class="space-y-4">
                    <input type="range" id="audio-slider" min="0" max="100" value="0" class="w-full h-8 bg-slate-200 rounded-2xl appearance-none cursor-pointer accent-amber-600 focus:outline-none focus:ring-4 focus:ring-amber-500" aria-label="Progression de la lecture">
                    <div class="flex justify-between text-xl md:text-2xl font-black text-slate-600">
                        <span id="time-current">00:00</span>
                        <span id="time-duration">00:00</span>
                    </div>
                </div>
            </div>

            <div id="player-controls-container" class="bg-white p-6 md:p-10 rounded-3xl shadow-md border-4 border-slate-200 flex flex-col gap-6 max-w-3xl mx-auto">
                
                <div class="grid grid-cols-2 gap-6 w-full">
                    <button id="btn-skip-back" class="control-btn" aria-label="Reculer d'une minute">
                        <span class="material-symbols-outlined control-icon">fast_rewind</span>
                        <span class="control-text">-1 MIN</span>
                    </button>
                    <button id="btn-prev" class="control-btn" aria-label="Chapitre précédent">
                        <span class="material-symbols-outlined control-icon">skip_previous</span>
                        <span class="control-text">PRÉCÉDENT</span>
                    </button>
                </div>

                <div class="w-full">
                    <button id="cleanPlayPause" class="control-btn-main" aria-label="Lecture ou Pause">
                        <span id="cleanPlayIcon" class="material-symbols-outlined control-icon-main" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                        <span id="cleanPlayLabel" class="control-text-main">LECTURE</span>
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-6 w-full">
                    <button id="cleanNext" class="control-btn" aria-label="Chapitre suivant">
                        <span class="material-symbols-outlined control-icon">skip_next</span>
                        <span class="control-text">SUIVANT</span>
                    </button>
                    <button id="btn-skip-forward" class="control-btn" aria-label="Avancer d'une minute">
                        <span class="material-symbols-outlined control-icon">fast_forward</span>
                        <span class="control-text">+1 MIN</span>
                    </button>
                </div>

            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t-4 border-slate-200 shadow-[0_-10px_30px_rgba(0,0,0,0.15)] p-4 flex justify-around items-center z-40 min-h-[120px]">
        <button id="nav-home" class="nav-tab focus:outline-none focus:ring-4 focus:ring-amber-500">
            <span class="material-symbols-outlined text-[50px] md:text-[60px]">home</span>
            <span class="text-xl md:text-2xl font-black mt-2">Accueil</span>
        </button>
        <button id="nav-player" class="nav-tab focus:outline-none focus:ring-4 focus:ring-amber-500">
            <span class="material-symbols-outlined text-[50px] md:text-[60px]">radio</span>
            <span class="text-xl md:text-2xl font-black mt-2">Lecteur</span>
        </button>
        <button id="nav-history" class="nav-tab focus:outline-none focus:ring-4 focus:ring-amber-500">
            <span class="material-symbols-outlined text-[50px] md:text-[60px]">history</span>
            <span class="text-xl md:text-2xl font-black mt-2">Historique</span>
        </button>
    </nav>

    <div id="loading-overlay" class="hidden fixed inset-0 bg-slate-900/95 backdrop-blur-md flex flex-col items-center justify-center text-white z-50">
        <div class="animate-spin rounded-full h-32 w-32 border-t-8 border-b-8 border-amber-500 mb-8"></div>
        <p class="text-3xl md:text-4xl font-black text-center px-4">Analyse du livre en cours...</p>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
