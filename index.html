<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#d97706" />
  <title>Lumière Audio - Lecteur DAISY</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        fontFamily: {
          sans: ['Luciole', 'Arial', 'sans-serif'],
        },
        extend: {
          colors: {
            accent: 'var(--accent)',
            background: 'var(--bg)',
            surface: 'var(--surface)',
            surfaceHover: 'var(--surface-hover)',
            textPrimary: 'var(--text-primary)',
            textSecondary: 'var(--text-secondary)',
            borderCustom: 'var(--border)',
            borderLight: 'var(--border-light)',
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

  <link rel="stylesheet" href="style.css" />

  <link rel="manifest" href="manifest.json" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>

<body class="theme-light flex flex-col h-screen bg-background text-textPrimary overflow-hidden transition-colors duration-200">

  <header class="shrink-0 p-4 md:p-6 bg-surface shadow-md flex justify-between items-center border-b-4 border-borderLight z-20">
    <h1 class="text-3xl md:text-4xl font-black flex items-center gap-4 text-textPrimary">
      <img src="Logo Lumière Audio.png" alt="Logo Lumière Audio" class="h-12 md:h-16 w-auto object-contain" />
      <span>Lumière Audio</span>
    </h1>
    <div class="flex items-center gap-4">
      <button id="toggleCleanMode" class="hidden flex flex-col items-center justify-center p-3 rounded-2xl bg-surface hover:bg-surfaceHover text-textPrimary border-4 border-borderLight shadow-sm focus-visible:outline-accent transition-transform active:scale-95" aria-label="Basculer le mode simple">
        <span class="text-xs md:text-sm font-black uppercase tracking-wider mb-1">Mode Simple</span>
        <span class="material-symbols-outlined text-3xl md:text-4xl">check_box_outline_blank</span>
      </button>
      
      <button id="btn-theme-toggle" class="flex flex-col items-center justify-center p-3 rounded-2xl bg-surface hover:bg-surfaceHover text-textPrimary border-4 border-borderLight shadow-sm focus-visible:outline-accent transition-transform active:scale-95" aria-label="Changer le thème visuel">
        <span class="text-xs md:text-sm font-black uppercase tracking-wider mb-1">Thèmes</span>
        <span class="material-symbols-outlined text-3xl md:text-4xl">palette</span>
      </button>
    </div>
  </header>

  <main class="flex-1 w-full max-w-5xl mx-auto overflow-y-auto pb-36 md:pb-24 p-4 md:p-8">
    
    <section id="view-home" class="space-y-8">
      <div class="bg-surface p-8 md:p-12 rounded-3xl shadow-md border-4 border-borderLight text-center space-y-8">
        <p class="text-2xl md:text-3xl leading-relaxed font-bold text-textPrimary">
          Votre lecteur de livres audio DAISY. <br>
          Glissez-déposez l'archive ZIP ou parcourez vos fichiers.
        </p>
        
        <div id="dropZone" class="border-8 border-dashed border-borderLight rounded-3xl p-12 md:p-24 cursor-pointer hover:bg-surfaceHover transition-colors text-center bg-background focus-visible:outline-accent" tabindex="0" aria-label="Zone de dépôt du fichier zip">
          <span class="material-symbols-outlined text-[80px] md:text-[120px] text-textSecondary">cloud_upload</span>
          <p class="mt-6 text-3xl md:text-4xl font-black text-textPrimary">Déposez votre fichier ZIP ici</p>
          <button id="btn-browse" class="mt-10 bg-accent text-white font-black text-2xl md:text-3xl px-12 py-6 rounded-3xl shadow-lg border-4 border-accent focus-visible:outline-white active:scale-95 transition-transform">Parcourir mes fichiers</button>
          <input type="file" id="file-input" accept=".zip" class="hidden">
        </div>
      </div>
    </section>

    <section id="view-history" class="hidden space-y-8">
      <h2 class="text-3xl md:text-4xl font-black text-textPrimary flex items-center gap-4">
        <span class="material-symbols-outlined text-4xl md:text-5xl">history</span> Vos lectures récentes
      </h2>
      <div id="history-container-full" class="space-y-6">
        </div>
    </section>

    <section id="view-player" class="hidden space-y-8">
      
      <div class="bg-surface p-6 md:p-10 rounded-3xl shadow-md border-4 border-borderLight space-y-8">
        <div class="text-center">
          <h3 id="book-title" class="text-3xl md:text-5xl font-black text-textPrimary leading-tight">Titre du livre</h3>
          <p id="chapter-title" class="text-2xl md:text-3xl font-bold text-textSecondary leading-relaxed mt-4">Chapitre</p>
        </div>
        
        <div class="space-y-4 pt-4">
          <input type="range" id="audio-slider" min="0" max="100" value="0" class="w-full cursor-pointer focus-visible:outline-accent" aria-label="Progression de la lecture">
          <div class="flex justify-between text-2xl font-black text-textSecondary">
            <span id="time-current">00:00</span>
            <span id="time-duration">00:00</span>
          </div>
        </div>
      </div>

      <div id="player-normal-layout" class="w-full">
        <div class="flex flex-row items-stretch justify-between gap-2 md:gap-4 w-full">
          <button id="btn-skip-back" class="control-btn" aria-label="Reculer d'une minute">
            <span class="material-symbols-outlined control-icon">fast_rewind</span>
            <span class="control-text">-1 MIN</span>
          </button>
          <button id="btn-prev" class="control-btn" aria-label="Chapitre précédent">
            <span class="material-symbols-outlined control-icon">skip_previous</span>
            <span class="control-text">PRÉCÉDENT</span>
          </button>
          <button id="playPause" class="control-btn control-btn-main" aria-label="Lecture ou Pause">
            <span id="playPauseIcon" class="material-symbols-outlined control-icon-main" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
            <span id="playLabel" class="control-text">LECTURE</span>
          </button>
          <button id="btn-next" class="control-btn" aria-label="Chapitre suivant">
            <span class="material-symbols-outlined control-icon">skip_next</span>
            <span class="control-text">SUIVANT</span>
          </button>
          <button id="btn-skip-forward" class="control-btn" aria-label="Avancer d'une minute">
            <span class="material-symbols-outlined control-icon">fast_forward</span>
            <span class="control-text">+1 MIN</span>
          </button>
        </div>
      </div>

      <div id="player-clean-layout" class="hidden w-full flex justify-center py-6">
        <button id="cleanPlayPause" class="w-full max-w-md aspect-square rounded-[3rem] bg-accent border-8 border-borderLight flex flex-col items-center justify-center transition-transform active:scale-95 shadow-2xl focus-visible:outline-accent" aria-label="Lecture ou Pause">
          <span id="cleanPlayIcon" class="material-symbols-outlined text-[10rem] text-white" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
          <span id="cleanPlayLabel" class="text-4xl font-black mt-6 text-white tracking-widest">LECTURE</span>
        </button>
      </div>

    </section>
  </main>

  <nav class="fixed bottom-0 left-0 right-0 z-50 bg-surface border-t-4 border-borderLight shadow-[0_-10px_30px_rgba(0,0,0,0.15)]">
    <div class="flex items-center justify-around p-2 md:p-3 max-w-5xl mx-auto w-full">
      <button id="nav-home" class="nav-btn active" aria-label="Accueil" aria-current="page">
        <span class="material-symbols-outlined" aria-hidden="true">home</span>
        <span>Accueil</span>
      </button>
      <button id="nav-player" class="nav-btn" aria-label="Lecteur audio">
        <span class="material-symbols-outlined" aria-hidden="true">radio</span>
        <span>Lecteur</span>
      </button>
      <button id="nav-history" class="nav-btn" aria-label="Historique de lecture">
        <span class="material-symbols-outlined" aria-hidden="true">history</span>
        <span>Historique</span>
      </button>
    </div>
  </nav>

  <div id="loading-overlay" class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center gap-6 bg-background bg-opacity-95">
    <div class="w-20 h-20 border-8 border-borderLight border-t-accent rounded-full animate-spin"></div>
    <p class="text-3xl font-black text-textPrimary">Analyse en cours...</p>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
