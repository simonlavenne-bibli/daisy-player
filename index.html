<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#d97706" />
  <title>Lumière Audio - Lecteur DAISY</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent:      'var(--accent)',
            background:  'var(--bg)',
            surface:     'var(--surface)',
            textPrimary: 'var(--text-primary)',
            textSecondary: 'var(--text-secondary)',
            borderCustom: 'var(--border)',
          },
          borderColor: {
            borderCustom: 'var(--border)',
            borderLight:  'var(--border-light)',
          }
        }
      }
    }
  </script>

  <!-- Material Symbols -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

  <!-- CSS du projet -->
  <link rel="stylesheet" href="style.css" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />
</head>

<body class="flex flex-col h-screen bg-background text-textPrimary overflow-hidden">

  <!-- ══════════════════════════════════════════════════════════
       EN-TÊTE
  ══════════════════════════════════════════════════════════════ -->
  <header class="flex items-center justify-between px-4 md:px-6 py-3 border-b-2 border-borderCustom bg-surface flex-shrink-0">

    <!-- Logo + Titre -->
    <div class="flex items-center gap-3">
      <!-- NOUVEAU LOGO : remplace l'ampoule Material Symbols -->
      <img
        src="assets/logo.png"
        alt="Logo Lumière Audio"
        class="h-9 w-auto"
        aria-hidden="true"
      />
      <span class="text-2xl md:text-3xl font-black text-textPrimary tracking-tight">
        Lumière Audio
      </span>
    </div>

    <!-- Boutons d'action en-tête -->
    <div class="flex items-center gap-2 md:gap-3">

      <!-- Bouton Mode Simple : VISIBLE UNIQUEMENT sur la vue Lecteur (géré en JS) -->
      <button
        id="toggleCleanMode"
        class="hidden items-center gap-2 px-4 py-2 rounded-2xl border-2 border-borderCustom text-textPrimary font-black text-base md:text-lg hover:bg-surface transition-colors"
        aria-label="Basculer en mode simple"
        aria-pressed="false"
      >
        <span class="material-symbols-outlined text-2xl">check_box_outline_blank</span>
        <span class="font-black text-sm md:text-base">MODE SIMPLE</span>
      </button>

      <!-- Bouton Thème : affiche "Thèmes" au-dessus de l'icône -->
      <button
        id="btn-theme-toggle"
        class="btn-theme"
        aria-label="Changer le thème de couleur"
      >
        <span class="text-xs font-black uppercase tracking-widest leading-none">Thèmes</span>
        <span class="material-symbols-outlined" aria-hidden="true">palette</span>
      </button>

    </div>
  </header>

  <!-- ══════════════════════════════════════════════════════════
       ZONE PRINCIPALE (vues empilées, une seule visible)
  ══════════════════════════════════════════════════════════════ -->
  <main class="flex-1 relative overflow-hidden">

    <!-- ── VUE ACCUEIL ──────────────────────────────────────── -->
    <section
      id="view-home"
      class="absolute inset-0 flex flex-col p-4 md:p-8 gap-6"
      role="main"
      aria-label="Accueil — Importer un livre DAISY"
    >

      <!-- Zone d'import principale -->
      <div class="flex-1 flex flex-col items-center justify-center">
        <div class="w-full max-w-2xl bg-surface rounded-3xl border-2 border-borderCustom shadow-md p-6 md:p-8 flex flex-col gap-5">

          <p class="text-center font-bold text-textPrimary text-lg md:text-xl leading-snug">
            Votre lecteur de livres audio DAISY.<br />
            Glissez-déposez l'archive ZIP ou parcourez vos fichiers.
          </p>

          <!-- Zone drag & drop -->
          <div
            id="dropZone"
            class="rounded-2xl p-8 md:p-10 flex flex-col items-center gap-4 cursor-pointer"
            role="button"
            tabindex="0"
            aria-label="Zone de dépôt de fichier ZIP. Cliquez ou appuyez sur Entrée pour parcourir vos fichiers."
          >
            <span class="material-symbols-outlined text-6xl text-accent" aria-hidden="true">cloud_upload</span>
            <p class="font-black text-textPrimary text-xl md:text-2xl text-center">
              Déposez votre fichier ZIP ici
            </p>

            <!-- Bouton Parcourir -->
            <button
              id="btn-browse"
              class="px-8 py-4 rounded-full font-black text-lg md:text-xl text-white shadow-md"
              style="background-color: var(--btn-primary-bg); color: var(--btn-primary-text);"
              aria-label="Parcourir mes fichiers pour choisir un livre DAISY"
            >
              Parcourir mes fichiers
            </button>

            <!-- Input fichier caché -->
            <input
              id="file-input"
              type="file"
              accept=".zip"
              class="hidden"
              aria-hidden="true"
            />
          </div>
        </div>
      </div>

      <!-- Historique récent (section secondaire) -->
      <div class="w-full max-w-2xl mx-auto">
        <h2 class="flex items-center gap-2 text-lg font-black text-textSecondary mb-3">
          <span class="material-symbols-outlined text-2xl" aria-hidden="true">history</span>
          Vos lectures récentes
        </h2>
        <div
          id="history-container"
          class="flex flex-col gap-3"
          role="list"
          aria-label="Historique de lecture"
          aria-live="polite"
        ></div>
      </div>

    </section>

    <!-- ── VUE LECTEUR ───────────────────────────────────────── -->
    <section
      id="view-player"
      class="absolute inset-0 hidden flex-col p-4 md:p-6 gap-4"
      role="main"
      aria-label="Lecteur audio DAISY"
    >

      <!-- Disposition normale (mode complet) -->
      <div id="player-normal-layout" class="flex-1 flex flex-col gap-4 justify-center">

        <!-- Carte titre + slider -->
        <div class="bg-surface rounded-3xl border-2 border-borderCustom p-5 md:p-7 flex flex-col gap-3 shadow-md">
          <h2
            id="book-title"
            class="text-center font-black text-2xl md:text-3xl text-textPrimary"
            aria-live="polite"
          >
            Titre du livre
          </h2>
          <p
            id="chapter-title"
            class="text-center font-bold text-textSecondary text-lg"
            aria-live="polite"
          >
            Chapitre
          </p>

          <!-- Barre de progression audio -->
          <div class="flex flex-col gap-1 mt-2">
            <input
              id="audio-slider"
              type="range"
              min="0"
              max="100"
              value="0"
              class="w-full"
              aria-label="Position de lecture"
            />
            <div class="flex justify-between text-sm font-bold text-textSecondary">
              <span id="time-current" aria-label="Temps écoulé">00:00</span>
              <span id="time-duration" aria-label="Durée totale">00:00</span>
            </div>
          </div>
        </div>

        <!-- Contrôles audio -->
        <div class="flex items-center justify-center gap-2 md:gap-4">

          <button
            id="btn-skip-back"
            class="flex flex-col items-center justify-center gap-1 px-4 py-3 rounded-2xl border-2 border-borderCustom bg-surface font-black text-sm text-textPrimary min-h-[64px] min-w-[64px] hover:bg-surface-hover transition-colors"
            aria-label="Reculer d'une minute"
          >
            <span class="material-symbols-outlined text-2xl" aria-hidden="true">fast_rewind</span>
            <span>-1 MIN</span>
          </button>

          <button
            id="btn-prev"
            class="flex flex-col items-center justify-center gap-1 px-4 py-3 rounded-2xl border-2 border-borderCustom bg-surface font-black text-sm text-textPrimary min-h-[64px] min-w-[64px] hover:bg-surface-hover transition-colors"
            aria-label="Chapitre précédent"
          >
            <span class="material-symbols-outlined text-2xl" aria-hidden="true">skip_previous</span>
            <span>PRÉCÉDENT</span>
          </button>

          <button
            id="playPause"
            class="flex flex-col items-center justify-center gap-1 px-5 py-3 rounded-2xl border-2 border-borderCustom font-black text-base min-h-[72px] min-w-[80px] shadow-md hover:opacity-90 transition-opacity"
            style="background-color: var(--btn-primary-bg); color: var(--btn-primary-text); border-color: var(--btn-primary-bg);"
            aria-label="Lecture / Pause"
            aria-pressed="false"
          >
            <span class="material-symbols-outlined text-3xl" aria-hidden="true">play_arrow</span>
            <span id="playPause-label">LECTURE</span>
          </button>

          <button
            id="btn-next"
            class="flex flex-col items-center justify-center gap-1 px-4 py-3 rounded-2xl border-2 border-borderCustom bg-surface font-black text-sm text-textPrimary min-h-[64px] min-w-[64px] hover:bg-surface-hover transition-colors"
            aria-label="Chapitre suivant"
          >
            <span class="material-symbols-outlined text-2xl" aria-hidden="true">skip_next</span>
            <span>SUIVANT</span>
          </button>

          <button
            id="btn-skip-forward"
            class="flex flex-col items-center justify-center gap-1 px-4 py-3 rounded-2xl border-2 border-borderCustom bg-surface font-black text-sm text-textPrimary min-h-[64px] min-w-[64px] hover:bg-surface-hover transition-colors"
            aria-label="Avancer d'une minute"
          >
            <span class="material-symbols-outlined text-2xl" aria-hidden="true">fast_forward</span>
            <span>+1 MIN</span>
          </button>

        </div>
      </div>

      <!-- Disposition mode simple (épurée) -->
      <div id="player-clean-layout" class="hidden flex-1 flex flex-col items-center justify-center gap-6">

        <h2
          id="clean-book-title"
          class="text-center font-black text-3xl md:text-4xl text-textPrimary"
          aria-live="polite"
        >
          Titre du livre
        </h2>

        <button
          id="cleanPlayPause"
          class="flex flex-col items-center justify-center gap-2 rounded-3xl font-black text-2xl min-h-[120px] min-w-[200px] shadow-lg hover:opacity-90 transition-opacity"
          style="background-color: var(--btn-primary-bg); color: var(--btn-primary-text);"
          aria-label="Lecture / Pause"
          aria-pressed="false"
        >
          <span class="material-symbols-outlined text-5xl" aria-hidden="true">play_arrow</span>
          <span>LECTURE</span>
        </button>

      </div>

    </section>

    <!-- ── VUE HISTORIQUE ────────────────────────────────────── -->
    <section
      id="view-history"
      class="absolute inset-0 hidden flex-col p-4 md:p-8 gap-4"
      role="main"
      aria-label="Historique de lecture"
    >
      <h2 class="flex items-center gap-2 text-xl font-black text-textPrimary">
        <span class="material-symbols-outlined text-3xl text-accent" aria-hidden="true">history</span>
        Historique de lecture
      </h2>
      <div
        id="history-container-full"
        class="flex flex-col gap-4"
        role="list"
        aria-label="Liste de l'historique de lecture"
        aria-live="polite"
      ></div>
    </section>

  </main>

  <!-- ══════════════════════════════════════════════════════════
       BARRE DE NAVIGATION INFÉRIEURE
  ══════════════════════════════════════════════════════════════ -->
  <nav
    class="flex-shrink-0 bg-surface border-t-2 border-borderCustom"
    aria-label="Navigation principale"
  >
    <div class="flex items-center justify-around px-2 py-1">

      <button
        id="nav-home"
        class="nav-btn active"
        aria-label="Accueil"
        aria-current="page"
      >
        <span class="material-symbols-outlined" aria-hidden="true">home</span>
        <span>Accueil</span>
      </button>

      <button
        id="nav-player"
        class="nav-btn"
        aria-label="Lecteur audio"
      >
        <span class="material-symbols-outlined" aria-hidden="true">radio</span>
        <span>Lecteur</span>
      </button>

      <button
        id="nav-history"
        class="nav-btn"
        aria-label="Historique de lecture"
      >
        <span class="material-symbols-outlined" aria-hidden="true">history</span>
        <span>Historique</span>
      </button>

    </div>
  </nav>

  <!-- ══════════════════════════════════════════════════════════
       OVERLAY DE CHARGEMENT
  ══════════════════════════════════════════════════════════════ -->
  <div
    id="loading-overlay"
    class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center gap-4"
    role="status"
    aria-label="Chargement en cours"
    aria-live="assertive"
  >
    <div class="w-12 h-12 border-4 border-borderLight border-t-accent rounded-full animate-spin" aria-hidden="true"></div>
    <p class="font-black text-xl text-textPrimary">Analyse en cours…</p>
  </div>

  <!-- Script principal -->
  <script type="module" src="js/main.js"></script>

</body>
</html>
